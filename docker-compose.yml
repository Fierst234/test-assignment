services:
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    networks:
      - internal
    # Port is NOT published to the host — only reachable inside the docker network
    expose:
      - "8080"

  nginx:
    build: ./nginx
    container_name: nginx
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge
    name: network